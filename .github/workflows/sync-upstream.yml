name: Sync upstream Google APIs

on:
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 06:00 UTC
  workflow_dispatch:       # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync from googleapis/googleapis
        run: ./scripts/sync.sh

      - name: Check for changes
        id: diff
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git reset HEAD
          fi

      - name: Create PR if changed
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="sync/googleapis-$(date +%Y%m%d)"
          git checkout -b "${BRANCH}"
          git add -A
          git commit -m "Sync Google API protos from upstream googleapis"
          git push origin "${BRANCH}"
          PR_URL=$(gh pr create \
            --title "Sync Google API protos from upstream" \
            --body "$(cat <<'EOF'
          Automated sync from [googleapis/googleapis](https://github.com/googleapis/googleapis).

          This PR will auto-merge after CI passes.
          EOF
          )" \
            --base main \
            --head "${BRANCH}")
          echo "Created PR: ${PR_URL}"
          gh pr merge "${PR_URL}" --auto --squash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
