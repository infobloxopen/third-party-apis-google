name: Sync upstream Google APIs

on:
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 06:00 UTC
  workflow_dispatch:       # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.diff.outputs.changed }}
      pr_url: ${{ steps.pr.outputs.pr_url }}
      branch: ${{ steps.pr.outputs.branch }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.APX_INFOBLOXOPEN_USER }}

      - name: Sync from googleapis/googleapis
        run: ./scripts/sync.sh

      - name: Check for changes
        id: diff
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git reset HEAD
          fi

      - name: Create PR
        id: pr
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "apx-bot"
          git config user.email "apx-bot@users.noreply.github.com"
          BRANCH="sync/googleapis-$(date +%Y%m%d-%H%M)"
          git checkout -b "${BRANCH}"
          git add -A
          git commit -m "Sync Google API protos from upstream googleapis"
          git push origin "${BRANCH}"
          PR_URL=$(gh pr create \
            --title "Sync Google API protos from upstream" \
            --body "Automated sync from [googleapis/googleapis](https://github.com/googleapis/googleapis)." \
            --base main \
            --head "${BRANCH}")
          echo "pr_url=${PR_URL}" >> "$GITHUB_OUTPUT"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.APX_INFOBLOXOPEN_USER }}

  validate:
    needs: sync
    if: needs.sync.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.sync.outputs.branch }}

      - name: Validate proto files
        run: |
          errors=0
          for f in $(find google -name '*.proto'); do
            if ! head -50 "$f" | grep -q '^package '; then
              echo "ERROR: $f missing package declaration"
              errors=$((errors + 1))
            fi
          done
          if [ "$errors" -gt 0 ]; then
            echo "$errors validation error(s) found"
            exit 1
          fi
          echo "All proto files validated successfully"

  merge-and-tag:
    needs: [sync, validate]
    if: needs.sync.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Auto-merge PR
        run: gh pr merge "${{ needs.sync.outputs.pr_url }}" --squash --admin
        env:
          GH_TOKEN: ${{ secrets.APX_INFOBLOXOPEN_USER }}

      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.APX_INFOBLOXOPEN_USER }}

      - name: Pull latest after merge
        run: git pull origin main

      - name: Bump release tags
        run: |
          git config user.name "apx-bot"
          git config user.email "apx-bot@users.noreply.github.com"

          MODULES="proto/google/api/v1 proto/google/rpc/v1"

          for module in $MODULES; do
            LATEST=$(git tag -l "${module}/v*" --sort=-v:refname | head -1)
            if [ -z "$LATEST" ]; then
              NEW_TAG="${module}/v1.0.0"
            else
              VERSION="${LATEST##*/}"
              MAJOR="${VERSION%%.*}"
              REST="${VERSION#*.}"
              MINOR="${REST%%.*}"
              PATCH="${REST#*.}"
              NEW_PATCH=$((PATCH + 1))
              NEW_TAG="${module}/${MAJOR}.${MINOR}.${NEW_PATCH}"
            fi
            echo "Tagging ${NEW_TAG} (was: ${LATEST:-none})"
            git tag "${NEW_TAG}"
          done

          git push origin --tags
        env:
          GH_TOKEN: ${{ secrets.APX_INFOBLOXOPEN_USER }}

  publish-to-catalog:
    needs: merge-and-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Generate release manifests and open PR to apis
        run: |
          git config user.name "apx-bot"
          git config user.email "apx-bot@users.noreply.github.com"

          MODULES="proto/google/api/v1 proto/google/rpc/v1"
          SOURCE_REPO="github.com/infobloxopen/third-party-apis-google"
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          # Collect new tags created in this run
          TAGS=""
          for module in $MODULES; do
            TAG=$(git tag -l "${module}/v*" --sort=-v:refname | head -1)
            if [ -n "$TAG" ]; then
              TAGS="${TAGS} ${TAG}"
            fi
          done

          if [ -z "$TAGS" ]; then
            echo "No tags found, skipping"
            exit 0
          fi

          # Clone apis repo
          gh repo clone infobloxopen/apis /tmp/apis -- --depth=1
          cd /tmp/apis
          git config user.name "apx-bot"
          git config user.email "apx-bot@users.noreply.github.com"

          BRANCH="release/google-apis-$(date +%Y%m%d-%H%M)"
          git checkout -b "${BRANCH}"

          # For each module, create the release manifest
          for TAG in $TAGS; do
            # TAG is like proto/google/api/v1/v1.0.1
            MODULE="${TAG%/*}"          # proto/google/api/v1
            VERSION="${TAG##*/}"        # v1.0.1

            # Determine source_path from module ID
            # proto/google/api/v1 → google/api
            FORMAT=$(echo "$MODULE" | cut -d/ -f1)
            DOMAIN=$(echo "$MODULE" | cut -d/ -f2)
            NAME=$(echo "$MODULE" | cut -d/ -f3)
            SOURCE_PATH="${DOMAIN}/${NAME}"

            # Create release manifest directory
            MANIFEST_DIR="releases/${MODULE}"
            mkdir -p "${MANIFEST_DIR}"

            # Write manifest
            cat > "${MANIFEST_DIR}/${VERSION}.yaml" <<MANIFEST
            id: ${MODULE}
            version: ${VERSION}
            format: ${FORMAT}
            source_repo: ${SOURCE_REPO}
            source_ref: ${TAG}
            source_path: ${SOURCE_PATH}
            import_mode: preserve
            released_at: "${NOW}"
          MANIFEST

            echo "Created manifest: ${MANIFEST_DIR}/${VERSION}.yaml"
          done

          git add releases/
          git commit -m "Release Google APIs: ${TAGS}"
          git push origin "${BRANCH}"

          gh pr create \
            --repo infobloxopen/apis \
            --title "Release: Google APIs $(date +%Y-%m-%d)" \
            --body "$(cat <<EOF
          ## API Releases

          $(for TAG in $TAGS; do echo "- \`${TAG}\`"; done)

          Source: [third-party-apis-google](https://github.com/infobloxopen/third-party-apis-google)

          This PR adds release manifests. After merge, the on-merge workflow will:
          1. Create snapshot tags with the actual proto files
          2. Regenerate the API catalog
          3. Push the updated OCI catalog image
          EOF
          )" \
            --base main \
            --head "${BRANCH}"
        env:
          GH_TOKEN: ${{ secrets.APX_INFOBLOXOPEN_USER }}
