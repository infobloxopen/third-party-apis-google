name: Sync upstream Google APIs

on:
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 06:00 UTC
  workflow_dispatch:       # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.diff.outputs.changed }}
      pr_url: ${{ steps.pr.outputs.pr_url }}
      branch: ${{ steps.pr.outputs.branch }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for tag listing

      - name: Sync from googleapis/googleapis
        run: ./scripts/sync.sh

      - name: Check for changes
        id: diff
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git reset HEAD
          fi

      - name: Create PR
        id: pr
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="sync/googleapis-$(date +%Y%m%d-%H%M)"
          git checkout -b "${BRANCH}"
          git add -A
          git commit -m "Sync Google API protos from upstream googleapis"
          git push origin "${BRANCH}"
          PR_URL=$(gh pr create \
            --title "Sync Google API protos from upstream" \
            --body "Automated sync from [googleapis/googleapis](https://github.com/googleapis/googleapis)." \
            --base main \
            --head "${BRANCH}")
          echo "pr_url=${PR_URL}" >> "$GITHUB_OUTPUT"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  validate:
    needs: sync
    if: needs.sync.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.sync.outputs.branch }}

      - name: Validate proto files
        run: |
          errors=0
          for f in $(find google -name '*.proto'); do
            if ! head -50 "$f" | grep -q '^package '; then
              echo "ERROR: $f missing package declaration"
              errors=$((errors + 1))
            fi
          done
          if [ "$errors" -gt 0 ]; then
            echo "$errors validation error(s) found"
            exit 1
          fi
          echo "All proto files validated successfully"

  merge-and-tag:
    needs: [sync, validate]
    if: needs.sync.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Auto-merge PR
        run: |
          PR_URL="${{ needs.sync.outputs.pr_url }}"
          gh pr merge "${PR_URL}" --squash --admin
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0  # Need all tags

      - name: Pull latest after merge
        run: git pull origin main

      - name: Bump release tags
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # For each API module, find the latest tag and bump the patch version.
          MODULES="proto/google/api/v1 proto/google/rpc/v1"

          for module in $MODULES; do
            # Find latest tag for this module, sorted by semver.
            LATEST=$(git tag -l "${module}/v*" --sort=-v:refname | head -1)

            if [ -z "$LATEST" ]; then
              # No existing tag — start at v1.0.0
              NEW_TAG="${module}/v1.0.0"
            else
              # Extract version and bump patch.
              VERSION="${LATEST##*/}"       # e.g. "v1.2.3"
              MAJOR="${VERSION%%.*}"         # e.g. "v1"
              REST="${VERSION#*.}"           # e.g. "2.3"
              MINOR="${REST%%.*}"            # e.g. "2"
              PATCH="${REST#*.}"             # e.g. "3"
              NEW_PATCH=$((PATCH + 1))
              NEW_TAG="${module}/${MAJOR}.${MINOR}.${NEW_PATCH}"
            fi

            echo "Tagging ${NEW_TAG} (was: ${LATEST:-none})"
            git tag "${NEW_TAG}"
          done

          git push origin --tags
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
